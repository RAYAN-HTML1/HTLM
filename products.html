<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;margin:0}
nav{background:#020617;padding:15px;text-align:center;position:sticky;top:0}
nav a{color:#fff;margin:10px;text-decoration:none}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px
}

.product{
  background:#1e293b;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  transition:.3s
}

.product:hover{
  transform:translateY(-6px)
}

.product img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px
}

.price{
  color:#38bdf8;
  font-weight:bold
}

button{
  background:#38bdf8;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px
}

button:hover{
  background:#0ea5e9
}

.cart{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#020617;
  padding:15px;
  border-radius:10px;
  width:260px;
  max-height:300px;
  overflow:auto
}

.cart h3{margin-top:0}

.cart li{margin:5px 0}

.total{
  margin-top:10px;
  font-weight:bold;
  color:#38bdf8
}

.remove{
  background:#ef4444;
  margin-right:5px
}

.remove:hover{
  background:#dc2626
}

.badge{
  position:fixed;
  top:15px;
  left:15px;
  background:#38bdf8;
  color:#000;
  padding:8px 12px;
  border-radius:20px
}
</style>

</head>
<body>

<div class="badge">🛒 <span id="count">0</span></div>

<nav>
<a href="login.html">تسجيل دخول</a>
<a href="index.html">الرئيسية</a>
<a href="products.html">المنتجات</a>
<a href="contact.html">تواصل</a>
</nav>

<h1 style="text-align:center">🛍️ المنتجات</h1>

<div class="products">

  <div class="product">
    <img src="C:\Users\rraay\OneDrive\سطح المكتب\wep\img\سماعه.jpg">
    <h3>🎧 سماعة</h3>
    <p class="price">599 ريال</p>
    <button onclick="addToCart('سماعات',120)">أضف للسلة</button>
  </div>

  <div class="product">
    <img src="C:\Users\rraay\OneDrive\سطح المكتب\wep\img\ابل.webp">
    <h3>⌚ ساعة ذكية</h3>
    <p class="price">1275 ريال</p>
    <button onclick="addToCart('ساعة ذكية',250)">أضف للسلة</button>
  </div>

  <div class="product">
    <img src="C:\Users\rraay\OneDrive\سطح المكتب\wep\img\نوكيا.webp">
    <h3>📱 جوال</h3>
    <p class="price">1500 ريال</p>
    <button onclick="addToCart('جوال',1500)">أضف للسلة</button>
  </div>

</div>

<div class="cart">
  <h3>🧾 السلة</h3>
  <ul id="cart-items"></ul>
  <div class="total">الإجمالي: <span id="total">0</span> ريال</div>
</div>

<script>
let cart = [];

function addToCart(name,price){
  cart.push({name,price});
  renderCart();
}

function removeItem(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  let list = document.getElementById('cart-items');
  let total = 0;
  list.innerHTML='';

  cart.forEach((item,i)=>{
    total += item.price;
    let li = document.createElement('li');
    li.innerHTML = `${item.name} - ${item.price} ريال <button class='remove' onclick='removeItem(${i})'>حذف</button>`;
    list.appendChild(li);
  });

  document.getElementById('total').textContent = total;
  document.getElementById('count').textContent = cart.length;
}
</script>

</body>
</html>
